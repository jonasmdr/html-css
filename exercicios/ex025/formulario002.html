<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>
<body>
    <h1>Teste de formulario</h1>
    <form action="cadastro.php" method="POST" autocomplete="on"> <!-- AUTOCOMPLETE serve para aparecer a sugestão de completar o formulario, tem que ser usado no <from> e também na tag <INPUT> na tag INPUT tem que escolher de acordo com que o campo pede -->
        <p>
            <label for="isu">Usuário: </label>
            <input type="text" name="usu" id="iusu" required minlength="5" maxlength="15" size="8" placeholder="Nome do usuario" autocomplete="username"> <!-- colocaa o required pra dizer que precisa preencher pra poder enviar -->
        </p>
        <!-- PLACEHOLDER serve para deixar uma mensagem no espaço em que vai digitar no formulario -->

        <p>
            <label for="isenha">Senha: </label>
            <input type="password" name="senha" id="isenha" required minlength="8" maxlength="30" size="8" autocomplete="current-password"> <!-- size coloca tamanho da caixa de acordo com quantidades de letras, no caso 8, vai mostrar ate 8 caractere, depois disso vai passando pro lado pra ver -->

             <!-- minlength e maxlength serve para dizer o minimo e maximo de caracteres que precisam ser preenchidos -->
        </p>

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
