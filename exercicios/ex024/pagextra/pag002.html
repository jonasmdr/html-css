<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        div#tabela-caixa {
            overflow-x: auto;
        } /* O overflow no CSS serve para controlar o que acontece quando o conteúdo de um elemento é maior do que a caixa (container) onde ele está.

        Imagine que você tem uma  com um tamanho fixo definido (por exemplo, largura e altura de 200px), mas você colocou um texto muito longo ou uma imagem grande lá dentro. O conteúdo naturalmente vai "transbordar" (que é a tradução de overflow). Essa propriedade dita como o navegador deve lidar com isso. 
        Os 4 Valores Principais do Overflow
        overflow: visible; (Padrão): O conteúdo que não cabe simplesmente vaza para fora da caixa e continua visível na tela, passando por cima dos outros elementos que estiverem por perto.

        overflow: hidden;: O conteúdo que ultrapassar o limite da caixa será cortado e escondido. O usuário não conseguirá ver o que vazou e o navegador não cria barras de rolagem.

        overflow: scroll;: O conteúdo extra fica contido dentro da caixa, e o navegador adiciona barras de rolagem (scrollbars) para que o usuário possa rolar e ver o resto. Atenção: nesse caso, a barra de rolagem costuma ficar sempre visível, mesmo que o conteúdo caiba perfeitamente na caixa.

        overflow: auto;: É o comportamento mais inteligente e o mais usado. Ele age como o scroll, mas só faz a barra de rolagem aparecer se o conteúdo realmente transbordar. Se o conteúdo couber, nenhuma barra é mostrada.*/

        table {
            border-collapse: collapse;
            width: 500px;
        }

        td, th {
            border: 1px solid black;
            padding: 10px;
        }

        thead > tr > th {
            background-color: gray;
            color: white;
        }

        .linha-media {
            background-color: gray;
            color: white;
        }
    </style>
</head>
<body>

    <div id="tabela-caixa">
        <table>
            <thead>
                <tr>
                    <th scope="col" rowspan="2">Área</th>
                    <th scope="col" rowspan="2">Disciplinas</th>
                    <th scope="colgroup" colspan="2">Notas</th>
                    <th scope="col" rowspan="2">Média</th>
                </tr>
                <tr>
                    <th scope="col">Nota 1</th>
                    <th scope="col">Nota 2</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <th scope="rowgroup" rowspan="4">Exatas</th>
                    <td>Matemática</td>
                    <td>0.0</td>
                    <td>0.0</td>
                    <td>0.0</td>
                </tr>
                <tr>
                    <td>Física</td>
                    <td>0.0</td>
                    <td>0.0</td>
                    <td>0.0</td>
                </tr>
                <tr>
                    <td>Química</td>
                    <td>0.0</td>
                    <td>0.0</td>
                    <td>0.0</td>
                </tr>
                <tr>
                    <td>Biologia</td>
                    <td>0.0</td>
                    <td>0.0</td>
                    <td>0.0</td>
                </tr>
                <tr class="linha-media">
                    <th scope="row" colspan="4">Média de Exatas</th>
                    <td>0.0</td>
                </tr>
                <tr>
                    <th scope="rowgroup" rowspan="2">Humanas</th>
                    <td>História</td>
                    <td>0.0</td>
                    <td>0.0</td>
                    <td>0.0</td>
                </tr>
                <tr>
                    <td>Geografia</td>
                    <td>0.0</td>
                    <td>0.0</td>
                    <td>0.0</td>
                </tr>
                <tr class="linha-media">
                    <th scope="row" colspan="4">Média de Humanas</th>
                    <td>0.0</td>
                </tr>
            </tbody>
        </table>
   
    </div>
</body>
</html>



<!--
MAIS SOBRE O OVERFLOW

Controle Horizontal e Vertical
Você não precisa aplicar a regra para a caixa inteira; você pode controlar eixos específicos:

overflow-x: Controla apenas o vazamento horizontal (esquerda/direita). É extremamente comum usar overflow-x: hidden; no body ou em containers principais para evitar que o site "quebre" no celular e crie aquela barra de rolagem lateral indesejada.

overflow-y: Controla apenas o vazamento vertical (cima/baixo).

Exemplo prático: Se você estiver criando uma caixa de "Termos e Condições" num formulário, você define uma altura máxima para a caixa (max-height: 300px;) e aplica overflow-y: auto;. O usuário poderá ler o texto gigante rolando a barra apenas dentro daquela caixinha, sem esticar o seu layout.
-->
