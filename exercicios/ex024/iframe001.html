<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudos de iframe</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        
    </style>
</head>
<body>
    <h1>Testando o uso de um iframe</h1>
    <p>Acessando o site do 
         <!-- POR PADRAO ELE TEM 300X150 LARGURA X ALTURA -->
        <iframe src="https://www.cursoemvideo.com" frameborder="0" width="500" height="500" scrolling="no"> <!-- AS OPÇOES QUE TEM NO SCOLLING SAO AUTO, YES E NO, QUE RESPECTIVAMENTE SAO: TER UMA BARRA DE ROLAGEM CASO O CONTEUDO SEJA MAIOR QUE O IFRAME. TER UMA BARRA DE ROLAGEM MESMO QUE O CONTEUDO APAREÇA POR COMPLETO. NAO TER BARRA DE ROLAGEM -->No
            <a href="https://www.cursoemvideo.com" target="_blank">Curso em viddeo</a>
            <!-- GERALMENTE EM CELULAR NAO VAI SER COMPATIVEL, AÍ COLOCA O LINK PARA APARECER NO LUGAR -->
        </iframe>
        
       para aprender a programar</a></p>

       <p>Acessando site do 
        <iframe src="https://www.google.com.br" frameborder="0"> <!-- ALGUNS SITES NAO PODEM SER INSERIDOS EM IFRAMES -->
            <a href="https://www.google.com.br">Google</a>

        </iframe>
       </p>
</body>
</html>

iframe = frame in line
