<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <style>
        div.conteiner {
            background-color: salmon;
            display: flex;
            flex-direction: column-reverse;
        }

        div.item {
            background-color: lightblue;
            border: 1px solid black;

            flex: auto;
        }
    </style>
</head>
<body>
    <div class="conteiner">
        <div class="item">Abate</div>
        <div class="item">Bola</div>
        <div class="item">Coala</div>
        <div class="item">Dado</div>
        <div class="item">Elefante</div>
        <div class="item">Farol</div>
        <div class="item">Gato</div>
    </div>
</body>
</html>
