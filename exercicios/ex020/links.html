<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            color: rgb(99, 79, 192);
            text-decoration: none;
            font-weight: bold;
        }

        a:visited {
            color: rgb(214, 163, 100);
        }

        a:hover {
            color: rgb(165, 121, 67);
            text-decoration: underline;
        }

        a:active {
            color: rgb(216, 195, 149);
        }

        .especial {
            background-color: rgb(192, 181, 166);
        }

        .especial::before {
            content: '→';
        }

        .especial::after {
            content: '←';
        }
    </style>
</head>
<body>
    <h1>Personalizando links</h1>
    <ul>
        <li><a href="https://gustavoguanabara.github.io" target="_blank" rel="external">Repositório GitHub</a></li>
        <li><a href="https://youtube.com" target="_blank" rel="external" class="especial">Canal do YouTube</a></li>
        <li><a href="https://www.cursoemvideo.com" target="_blank" rel="external">Site do Curso</a></li>
    </ul>
</body>
</html>
