<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags HTML</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em HTML5, podemos inserir os elementos da linha a seguir. Passe o mouse sobre os termos para descobrir qual tag deverá utilizar em cada</p>
    <ul type="square">
        <li><abbr title="Usa a tag P">Paragrafos</abbr></li>
        <li><abbr title="Usa a tag h1">Títulos</abbr></li>
        <li><abbr title="Usa a tag img">Imagem</abbr></li>
        <li><abbr title="Usa a tag abbr">Abreviaçoes</abbr></li>
        <li><abbr title="Usa a tag code">Código-fonte</abbr></li>
        <li><abbr title="Usa a tag ol e li">Listas numeradas</abbr></li>
        <li><abbr title="Usa a tag ul e li">Listas com demarcadores</abbr></li>
    </ul>
    
</body>
</html>
